server:
  port: 8082

spring:
  application:
    name: job-service

  datasource:
    url: jdbc:mysql://localhost:3306/job_db
    username: root
    password: tiger
    driver-class-name: com.mysql.cj.jdbc.Driver   

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect   

# ✅ EUREKA
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

# ✅ ACTUATOR
management:
  endpoints:
    web:
      exposure:
        include: health,info

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

# ✅ SWAGGER
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
